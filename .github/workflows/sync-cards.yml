name: Sync MTG cards to R2

on:
  schedule:
    - cron: '15 22 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: scripts
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: scripts/pnpm-lock.yaml

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Fetch Scryfall bulk
        run: pnpm run fetch

      - name: Show output
        run: ls -lh data/ && wc -l data/cards.jsonl
